name: Deploy to Hugging Face

on:
  workflow_run:
    workflows: ["CI — Finance RAG"]  # must match exactly the name: in ci.yml
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: quality        # only deploy if tests pass
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://victorsobotka:$HF_TOKEN@huggingface.co/spaces/victorsobottka/finance-rag
          git push hf main --force
